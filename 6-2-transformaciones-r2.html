<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visualizador de Transformaciones en ℝ² — Álgebra Lineal</title>
<style>
  :root{--brick:#B22222;--brick-light:#D4443E;--navy:#000080;--navy-light:#1a1aad;--forest:#228B22;--forest-light:#2eb82e;--gmitblue:#5A8AA8;--gmitblue-light:#7BA9C4;--gmitblue-pale:rgba(90,138,168,0.12);--bg:#F4F1EC;--surface:#FFFFFF;--surface-alt:#F9F7F4;--text:#1E1E1E;--text-secondary:#555;--text-muted:#888;--border:#D6D0C6;--shadow:0 2px 16px rgba(0,0,0,0.07);--radius:10px;--radius-sm:6px;--transition:0.25s cubic-bezier(.4,0,.2,1);--font-display:'Playfair Display',Georgia,serif;--font-body:'Source Sans 3','Segoe UI',sans-serif;--font-mono:'JetBrains Mono','Fira Code',monospace;}
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Source+Sans+3:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--font-body);background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;}
  .lab-header{background:linear-gradient(135deg,var(--navy) 0%,var(--gmitblue) 100%);color:#fff;padding:0.7rem 1.5rem;position:relative;overflow:hidden;}
  .lab-header::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 15% 50%,rgba(255,255,255,0.08) 0%,transparent 50%);pointer-events:none;}
  .lab-header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:0.8rem;position:relative;z-index:1;}
  .lab-icon{width:38px;height:38px;background:rgba(255,255,255,0.15);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.15rem;flex-shrink:0;}
  .lab-header h1{font-family:var(--font-display);font-size:clamp(0.9rem,2vw,1.25rem);font-weight:700;line-height:1.2;}
  .lab-subtitle{font-size:0.72rem;opacity:0.75;}
  .lab-badge{display:inline-block;background:var(--brick);color:#fff;font-size:0.6rem;font-weight:700;padding:0.15em 0.5em;border-radius:3px;letter-spacing:0.05em;text-transform:uppercase;margin-right:0.35rem;vertical-align:middle;}
  .lab-container{max-width:1400px;margin:0 auto;padding:0.6rem 0.8rem 1.5rem;}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
  .panel-head{padding:0.5rem 0.9rem;font-family:var(--font-display);font-size:0.85rem;font-weight:700;color:var(--navy);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0.4rem;background:var(--surface-alt);}
  .panel-body{padding:0.7rem 0.9rem;}
  .canvas-panel{margin-bottom:0.7rem;}
  .canvas-wrap{position:relative;width:100%;height:clamp(320px,52vh,580px);background:#fff;overflow:hidden;}
  .canvas-wrap canvas{position:absolute;inset:0;width:100%!important;height:100%!important;}
  .info-strip{display:flex;flex-wrap:wrap;gap:0.3rem 1.2rem;padding:0.45rem 0.9rem;font-size:0.75rem;font-family:var(--font-mono);border-top:1px solid var(--border);background:var(--surface-alt);}
  .info-item{display:flex;gap:0.25rem;align-items:center;}
  .info-item .il{color:var(--text-muted);}
  .info-item .iv{font-weight:700;color:var(--navy);}
  .info-item .iv.neg{color:var(--brick);}
  .controls-strip{display:grid;grid-template-columns:1fr auto 1fr;gap:0.7rem;align-items:start;}
  @media(max-width:900px){.controls-strip{grid-template-columns:1fr;}}
  .preset-scroll{display:flex;gap:0.3rem;flex-wrap:wrap;}
  .preset-pill{padding:0.25rem 0.55rem;border:1px solid var(--border);border-radius:20px;background:var(--surface);cursor:pointer;transition:var(--transition);font-size:0.7rem;font-weight:600;white-space:nowrap;display:inline-flex;align-items:center;gap:0.25rem;}
  .preset-pill:hover{border-color:var(--navy);background:var(--gmitblue-pale);}
  .preset-pill.active{border-color:var(--navy);background:var(--navy);color:#fff;}
  .matrix-compact{display:flex;align-items:center;gap:0.4rem;}
  .mat-bracket{font-size:2.2rem;color:var(--navy);line-height:1;user-select:none;font-weight:200;}
  .mat-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
  .mat-grid input{width:54px;padding:0.35rem 0.2rem;border:1px solid var(--border);border-radius:4px;font-family:var(--font-mono);font-size:0.88rem;text-align:center;transition:var(--transition);background:#fff;}
  .mat-grid input:focus{outline:none;border-color:var(--gmitblue);box-shadow:0 0 0 3px rgba(90,138,168,0.15);}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:0.3rem;padding:0.4rem 0.75rem;border:none;border-radius:var(--radius-sm);font-family:var(--font-body);font-size:0.78rem;font-weight:600;cursor:pointer;transition:var(--transition);white-space:nowrap;}
  .btn-primary{background:var(--forest);color:#fff;}.btn-primary:hover{background:var(--forest-light);}
  .btn-accent{background:var(--brick);color:#fff;}.btn-accent:hover{background:var(--brick-light);}
  .btn-row{display:flex;gap:0.4rem;flex-wrap:wrap;align-items:center;}
  .slider-inline{display:flex;align-items:center;gap:0.4rem;}
  .slider-inline input[type="range"]{width:110px;accent-color:var(--navy);height:4px;}
  .slider-inline .sv{font-family:var(--font-mono);font-size:0.78rem;font-weight:600;color:var(--navy);min-width:2rem;text-align:right;}
  .slider-inline label{font-size:0.75rem;font-weight:600;color:var(--text-secondary);}
  .checks-col{display:flex;flex-direction:column;gap:0.35rem;}
  .checks-col label{display:flex;align-items:center;gap:0.3rem;cursor:pointer;user-select:none;font-size:0.75rem;white-space:nowrap;}
  .checks-col input[type="checkbox"]{accent-color:var(--navy);width:14px;height:14px;}
  .lab-footer{max-width:1400px;margin:0 auto;padding:0.5rem 1rem;text-align:center;font-size:0.68rem;color:var(--text-muted);}
  @media(max-width:600px){.lab-header{padding:0.5rem 0.7rem;}.lab-container{padding:0.4rem;}.mat-grid input{width:44px;font-size:0.8rem;}.canvas-wrap{height:260px;}}
</style>
</head>
<body>
<header class="lab-header"><div class="lab-header-inner"><div class="lab-icon">🔄</div><div><h1><span class="lab-badge">Cap 6</span>Visualizador de Transformaciones Lineales en ℝ²</h1><div class="lab-subtitle">Laboratorio Interactivo · Transformaciones Lineales</div></div></div></header>
<div class="lab-container">
  <!-- CANVAS ON TOP -->
  <div class="panel canvas-panel">
    <div class="panel-head">📈 Visualización<span style="margin-left:auto;font-family:var(--font-mono);font-size:0.68rem;color:var(--text-muted);" id="coordDisp"></span></div>
    <div class="canvas-wrap" id="canvasWrap"><canvas id="cv"></canvas></div>
    <div class="info-strip" id="infoBar"></div>
  </div>
  <!-- CONTROLS BELOW -->
  <div class="controls-strip">
    <div class="panel"><div class="panel-head">🎯 Transformaciones</div><div class="panel-body"><div class="preset-scroll" id="presetGrid"></div></div></div>
    <div class="panel"><div class="panel-head">🔢 Matriz A</div><div class="panel-body" style="display:flex;flex-direction:column;gap:0.5rem;align-items:center;">
      <div class="matrix-compact"><span class="mat-bracket">[</span><div class="mat-grid"><input type="number" id="a11" value="1" step="0.1" oninput="onMatrixInput()"><input type="number" id="a12" value="0" step="0.1" oninput="onMatrixInput()"><input type="number" id="a21" value="0" step="0.1" oninput="onMatrixInput()"><input type="number" id="a22" value="1" step="0.1" oninput="onMatrixInput()"></div><span class="mat-bracket">]</span></div>
      <div id="sliderArea"><div id="angleWrap" class="slider-inline" style="display:none;"><label>θ</label><input type="range" id="angleSlider" min="0" max="360" step="1" value="45" oninput="updateAngle()"><span class="sv" id="angleVal">45°</span></div><div id="scaleWrap" class="slider-inline" style="display:none;"><label>k</label><input type="range" id="scaleSlider" min="-3" max="3" step="0.1" value="2" oninput="updateScale()"><span class="sv" id="scaleVal">2.0</span></div></div>
      <div class="btn-row"><button class="btn btn-primary" onclick="animateTransform()">▶ Animar</button><button class="btn btn-accent" onclick="resetView()">↺ Identidad</button></div>
    </div></div>
    <div class="panel"><div class="panel-head">⚙️ Opciones</div><div class="panel-body"><div class="checks-col">
      <label><input type="checkbox" id="chkGrid" checked onchange="draw()"> Cuadrícula transformada</label>
      <label><input type="checkbox" id="chkOrigGrid" checked onchange="draw()"> Cuadrícula original</label>
      <label><input type="checkbox" id="chkUnitCircle" onchange="draw()"> Circunferencia unitaria</label>
      <label><input type="checkbox" id="chkShape" checked onchange="draw()"> Figura de referencia</label>
    </div></div></div>
  </div>
</div>
<footer class="lab-footer">Álgebra Lineal con Abordaje Tecnológico · Laboratorio 6.2 · Transformaciones Lineales en ℝ²</footer>
<script>
let canvas,ctx,W,H,scale=60,ox,oy;
let A={a:1,b:0,c:0,d:1},target={a:1,b:0,c:0,d:1},animating=false,currentPreset=-1;
const PRESETS=[
  {name:'Identidad',icon:'🟰',m:[1,0,0,1],slider:null},
  {name:'Rotación θ',icon:'🔄',m:[0.707,-0.707,0.707,0.707],slider:'angle'},
  {name:'Rot 90°',icon:'↰',m:[0,-1,1,0],slider:null},
  {name:'Ref. eje x',icon:'↕',m:[1,0,0,-1],slider:null},
  {name:'Ref. eje y',icon:'↔',m:[-1,0,0,1],slider:null},
  {name:'Ref. y=x',icon:'⤡',m:[0,1,1,0],slider:null},
  {name:'Escala k',icon:'⬛',m:[2,0,0,2],slider:'scale'},
  {name:'Escala en x',icon:'↦',m:[2,0,0,1],slider:'scale'},
  {name:'Cizalla x',icon:'▱',m:[1,1,0,1],slider:null},
  {name:'Cizalla y',icon:'▱',m:[1,0,1,1],slider:null},
  {name:'Proy. x',icon:'📏',m:[1,0,0,0],slider:null},
  {name:'Proy. y',icon:'📐',m:[0,0,0,1],slider:null},
  {name:'Espiral',icon:'🌀',m:[0.5,-0.5,0.5,0.5],slider:null},
  {name:'Singular',icon:'💀',m:[1,2,2,4],slider:null},
];
window.addEventListener('DOMContentLoaded',()=>{canvas=document.getElementById('cv');ctx=canvas.getContext('2d');buildPresets();resize();selectPreset(0);initEvents();draw();});
window.addEventListener('resize',()=>{if(canvas){resize();draw();}});
function resize(){const wrap=document.getElementById('canvasWrap');const r=wrap.getBoundingClientRect();W=r.width;H=r.height;canvas.width=W*devicePixelRatio;canvas.height=H*devicePixelRatio;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);ox=W/2;oy=H/2;}
function buildPresets(){const g=document.getElementById('presetGrid');PRESETS.forEach((p,i)=>{const btn=document.createElement('button');btn.className='preset-pill';btn.id='preset_'+i;btn.innerHTML=`${p.icon} ${p.name}`;btn.onclick=()=>selectPreset(i);g.appendChild(btn);});}
function selectPreset(i){currentPreset=i;document.querySelectorAll('.preset-pill').forEach((b,j)=>b.classList.toggle('active',j===i));const p=PRESETS[i];document.getElementById('angleWrap').style.display=p.slider==='angle'?'flex':'none';document.getElementById('scaleWrap').style.display=p.slider==='scale'?'flex':'none';if(p.slider==='angle'){updateAngle();return;}if(p.slider==='scale'){updateScale();return;}setMatrix(p.m[0],p.m[1],p.m[2],p.m[3]);}
function setMatrix(a,b,c,d){target={a,b,c,d};document.getElementById('a11').value=r2(a);document.getElementById('a12').value=r2(b);document.getElementById('a21').value=r2(c);document.getElementById('a22').value=r2(d);A={a,b,c,d};draw();}
function onMatrixInput(){const a=pf('a11'),b=pf('a12'),c=pf('a21'),d=pf('a22');A={a,b,c,d};target={a,b,c,d};currentPreset=-1;document.querySelectorAll('.preset-pill').forEach(b=>b.classList.remove('active'));document.getElementById('angleWrap').style.display='none';document.getElementById('scaleWrap').style.display='none';draw();}
function updateAngle(){const deg=parseFloat(document.getElementById('angleSlider').value);document.getElementById('angleVal').textContent=deg+'°';const rad=deg*Math.PI/180;setMatrix(Math.cos(rad),-Math.sin(rad),Math.sin(rad),Math.cos(rad));}
function updateScale(){const k=parseFloat(document.getElementById('scaleSlider').value);document.getElementById('scaleVal').textContent=k.toFixed(1);const p=PRESETS[currentPreset];if(p&&p.name==='Escala en x')setMatrix(k,0,0,1);else setMatrix(k,0,0,k);}
function resetView(){selectPreset(0);}
function pf(id){return parseFloat(document.getElementById(id).value)||0;}
function r2(x){return Math.round(x*100)/100;}
function animateTransform(){if(animating)return;const from={a:1,b:0,c:0,d:1},to={...A};animating=true;const dur=800,start=performance.now();function tick(now){const t=Math.min((now-start)/dur,1);const e=t<0.5?2*t*t:(1-Math.pow(-2*t+2,2)/2);A={a:from.a+(to.a-from.a)*e,b:from.b+(to.b-from.b)*e,c:from.c+(to.c-from.c)*e,d:from.d+(to.d-from.d)*e};draw();if(t<1)requestAnimationFrame(tick);else{A={...to};animating=false;draw();}}requestAnimationFrame(tick);}
function Tr(x,y){return[A.a*x+A.b*y,A.c*x+A.d*y];}
function toS(x,y){return[ox+x*scale,oy-y*scale];}
function draw(){ctx.clearRect(0,0,W,H);drawOrigGrid();drawTransformedGrid();drawUnitCircle();drawShape();drawAxes();drawBasisVectors();updateInfo();}
function drawAxes(){ctx.save();ctx.strokeStyle='rgba(0,0,0,0.18)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,oy);ctx.lineTo(W,oy);ctx.stroke();ctx.beginPath();ctx.moveTo(ox,0);ctx.lineTo(ox,H);ctx.stroke();ctx.fillStyle='rgba(0,0,0,0.25)';ctx.font='500 10px "JetBrains Mono",monospace';ctx.textAlign='center';const mx=Math.ceil(W/scale/2);for(let i=-mx;i<=mx;i++){if(i===0)continue;ctx.fillText(i,ox+i*scale,oy+13);}ctx.textAlign='right';const my=Math.ceil(H/scale/2);for(let j=-my;j<=my;j++){if(j===0)continue;ctx.fillText(j,ox-5,oy-j*scale+4);}ctx.fillStyle='rgba(0,0,0,0.35)';ctx.font='600 12px "Source Sans 3",sans-serif';ctx.textAlign='left';ctx.fillText('x',W-16,oy-7);ctx.textAlign='center';ctx.fillText('y',ox+11,13);ctx.restore();}
function drawOrigGrid(){if(!document.getElementById('chkOrigGrid').checked)return;ctx.save();ctx.strokeStyle='rgba(0,0,0,0.045)';ctx.lineWidth=1;const N=Math.ceil(Math.max(W,H)/scale/2)+2;for(let i=-N;i<=N;i++){const x=ox+i*scale;ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}for(let j=-N;j<=N;j++){const y=oy+j*scale;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}ctx.restore();}
function drawTransformedGrid(){if(!document.getElementById('chkGrid').checked)return;ctx.save();const N=Math.ceil(Math.max(W,H)/scale/2)+3;ctx.strokeStyle='rgba(90,138,168,0.28)';ctx.lineWidth=1.2;for(let i=-N;i<=N;i++){ctx.beginPath();for(let t=-N;t<=N;t+=0.25){const[tx,ty]=Tr(i,t);const[sx,sy]=toS(tx,ty);t===-N?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy);}ctx.stroke();}ctx.strokeStyle='rgba(178,34,34,0.18)';for(let j=-N;j<=N;j++){ctx.beginPath();for(let t=-N;t<=N;t+=0.25){const[tx,ty]=Tr(t,j);const[sx,sy]=toS(tx,ty);t===-N?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy);}ctx.stroke();}ctx.lineWidth=2.5;ctx.strokeStyle='rgba(90,138,168,0.55)';ctx.beginPath();for(let t=-N;t<=N;t+=0.1){const[tx,ty]=Tr(t,0);const[sx,sy]=toS(tx,ty);t===-N?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy);}ctx.stroke();ctx.strokeStyle='rgba(178,34,34,0.45)';ctx.beginPath();for(let t=-N;t<=N;t+=0.1){const[tx,ty]=Tr(0,t);const[sx,sy]=toS(tx,ty);t===-N?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy);}ctx.stroke();ctx.restore();}
function drawBasisVectors(){drawArrow(0,0,1,0,'rgba(90,138,168,0.3)',1.5,[5,4]);drawArrow(0,0,0,1,'rgba(178,34,34,0.3)',1.5,[5,4]);const[e1x,e1y]=Tr(1,0),[e2x,e2y]=Tr(0,1);drawArrow(0,0,e1x,e1y,'#5A8AA8',3,null,'T(e₁)');drawArrow(0,0,e2x,e2y,'#B22222',3,null,'T(e₂)');ctx.save();const[s0x,s0y]=toS(0,0),[s1x,s1y]=toS(e1x,e1y),[s2x,s2y]=toS(e2x,e2y),[s3x,s3y]=toS(e1x+e2x,e1y+e2y);ctx.fillStyle='rgba(90,138,168,0.07)';ctx.strokeStyle='rgba(90,138,168,0.2)';ctx.lineWidth=1;ctx.setLineDash([4,3]);ctx.beginPath();ctx.moveTo(s0x,s0y);ctx.lineTo(s1x,s1y);ctx.lineTo(s3x,s3y);ctx.lineTo(s2x,s2y);ctx.closePath();ctx.fill();ctx.stroke();ctx.restore();}
function drawArrow(fx,fy,tx,ty,color,width,dash,label){const[sx,sy]=toS(fx,fy),[ex,ey]=toS(tx,ty);const dx=ex-sx,dy=ey-sy,len=Math.sqrt(dx*dx+dy*dy);if(len<2)return;ctx.save();ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=width;ctx.lineJoin='round';ctx.lineCap='round';if(dash)ctx.setLineDash(dash);const hl=Math.min(13,len*0.25),ang=Math.atan2(dy,dx);ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(ex-hl*Math.cos(ang),ey-hl*Math.sin(ang));ctx.stroke();ctx.setLineDash([]);ctx.beginPath();ctx.moveTo(ex,ey);ctx.lineTo(ex-hl*Math.cos(ang-0.35),ey-hl*Math.sin(ang-0.35));ctx.lineTo(ex-hl*Math.cos(ang+0.35),ey-hl*Math.sin(ang+0.35));ctx.closePath();ctx.fill();if(label){ctx.font='700 12px "Source Sans 3",sans-serif';ctx.fillText(label,ex+14*Math.cos(ang-0.5),ey+14*Math.sin(ang-0.5));}ctx.restore();}
function drawUnitCircle(){if(!document.getElementById('chkUnitCircle').checked)return;ctx.save();ctx.strokeStyle='rgba(0,0,0,0.1)';ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.beginPath();ctx.arc(ox,oy,scale,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);ctx.strokeStyle='rgba(255,140,0,0.55)';ctx.lineWidth=2;ctx.beginPath();for(let i=0;i<=200;i++){const t=i/200*Math.PI*2;const[tx,ty]=Tr(Math.cos(t),Math.sin(t));const[sx,sy]=toS(tx,ty);i===0?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy);}ctx.closePath();ctx.stroke();ctx.restore();}
function drawShape(){if(!document.getElementById('chkShape').checked)return;const house=[[0,0],[1,0],[1,1],[0.5,1.5],[0,1]];ctx.save();ctx.strokeStyle='rgba(0,0,0,0.08)';ctx.fillStyle='rgba(0,0,0,0.02)';ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.beginPath();house.forEach(([x,y],i)=>{const[sx,sy]=toS(x,y);i===0?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy);});ctx.closePath();ctx.fill();ctx.stroke();ctx.setLineDash([]);ctx.strokeStyle='rgba(34,139,34,0.65)';ctx.fillStyle='rgba(34,139,34,0.08)';ctx.lineWidth=2;ctx.beginPath();house.forEach(([x,y],i)=>{const[tx,ty]=Tr(x,y);const[sx,sy]=toS(tx,ty);i===0?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy);});ctx.closePath();ctx.fill();ctx.stroke();const[tcx,tcy]=Tr(0.5,0.6);const[scx,scy]=toS(tcx,tcy);ctx.fillStyle='rgba(34,139,34,0.6)';ctx.font='600 10px "Source Sans 3",sans-serif';ctx.textAlign='center';ctx.fillText('T(F)',scx,scy);ctx.restore();}
function updateInfo(){const det=A.a*A.d-A.b*A.c,trace=A.a+A.d,isInv=Math.abs(det)>1e-10;let type='General';if(Math.abs(A.a-1)<.01&&Math.abs(A.b)<.01&&Math.abs(A.c)<.01&&Math.abs(A.d-1)<.01)type='Identidad';else if(Math.abs(det)<1e-10)type='Singular';else if((Math.abs(det-1)<.05||Math.abs(det+1)<.05)&&Math.abs(A.a*A.a+A.c*A.c-1)<.05&&Math.abs(A.b*A.b+A.d*A.d-1)<.05)type=det>0?'Rotación':'Reflexión';const dc=det<0?'iv neg':'iv';document.getElementById('infoBar').innerHTML=`<div class="info-item"><span class="il">Tipo:</span><span class="iv">${type}</span></div><div class="info-item"><span class="il">det(A)=</span><span class="${dc}">${r2(det)}</span></div><div class="info-item"><span class="il">tr(A)=</span><span class="iv">${r2(trace)}</span></div><div class="info-item"><span class="il">T(e₁)=</span><span class="iv" style="color:#5A8AA8">(${r2(A.a)},${r2(A.c)})</span></div><div class="info-item"><span class="il">T(e₂)=</span><span class="iv" style="color:#B22222">(${r2(A.b)},${r2(A.d)})</span></div><div class="info-item"><span class="il">|det|=</span><span class="iv">${r2(Math.abs(det))}</span></div><div class="info-item"><span class="il">Inv:</span><span class="iv">${isInv?'Sí ✓':'No ✗'}</span></div>`;}
function initEvents(){canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect();const wx=(e.clientX-r.left-ox)/scale,wy=(oy-(e.clientY-r.top))/scale;document.getElementById('coordDisp').textContent=`(${wx.toFixed(1)}, ${wy.toFixed(1)})`;});}
</script>
</body>
</html>
