<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz: Geometría Vectorial — Álgebra Lineal</title>
<style>
  :root{--brick:#B22222;--navy:#000080;--forest:#228B22;--gmitblue:#5A8AA8;--gmitblue-pale:rgba(90,138,168,0.12);--bg:#F4F1EC;--surface:#FFFFFF;--surface-alt:#F9F7F4;--text:#1E1E1E;--text-secondary:#555;--text-muted:#888;--border:#D6D0C6;--shadow:0 2px 16px rgba(0,0,0,0.07);--radius:10px;--radius-sm:6px;--transition:0.25s cubic-bezier(.4,0,.2,1);--font-display:'Playfair Display',Georgia,serif;--font-body:'Source Sans 3','Segoe UI',sans-serif;--font-mono:'JetBrains Mono','Fira Code',monospace;--correct:#228B22;--wrong:#B22222;}
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Source+Sans+3:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--font-body);background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;}
  .lab-header{background:linear-gradient(135deg,var(--navy) 0%,var(--gmitblue) 100%);color:#fff;padding:0.7rem 1.5rem;position:relative;overflow:hidden;}
  .lab-header::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 15% 50%,rgba(255,255,255,0.08) 0%,transparent 50%);pointer-events:none;}
  .lab-header-inner{max-width:800px;margin:0 auto;display:flex;align-items:center;gap:0.8rem;position:relative;z-index:1;}
  .lab-icon{width:38px;height:38px;background:rgba(255,255,255,0.15);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.15rem;flex-shrink:0;}
  .lab-header h1{font-family:var(--font-display);font-size:clamp(0.9rem,2vw,1.25rem);font-weight:700;line-height:1.2;}
  .lab-subtitle{font-size:0.72rem;opacity:0.75;}
  .lab-badge{display:inline-block;background:var(--brick);color:#fff;font-size:0.6rem;font-weight:700;padding:0.15em 0.5em;border-radius:3px;letter-spacing:0.05em;text-transform:uppercase;margin-right:0.35rem;vertical-align:middle;}
  .main{max-width:800px;margin:0 auto;padding:0.6rem 0.8rem 1.5rem;}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:0.7rem;}
  .panel-body{padding:0.7rem 0.9rem;}
  .score-bar{display:flex;align-items:center;gap:1rem;padding:0.5rem 0.9rem;border-bottom:1px solid var(--border);background:var(--surface-alt);font-family:var(--font-mono);font-size:0.78rem;flex-wrap:wrap;}
  .score-item{display:flex;align-items:center;gap:0.3rem;}.score-item .slab{font-weight:700;}.score-item.correct .slab{color:var(--correct);}.score-item.wrong .slab{color:var(--wrong);}
  .progress-bar{flex:1;min-width:100px;height:6px;background:rgba(0,0,0,0.06);border-radius:3px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--forest);border-radius:3px;transition:width 0.4s ease;}
  .q-counter{font-family:var(--font-mono);font-size:0.72rem;color:var(--text-muted);}
  .q-topic{display:inline-block;padding:0.15em 0.5em;border-radius:10px;font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:0.3rem;}
  .q-text{font-size:0.92rem;font-weight:600;margin:0.4rem 0 0.6rem;line-height:1.5;}
  .options{display:flex;flex-direction:column;gap:0.4rem;margin:0.5rem 0;}
  .opt-btn{display:flex;align-items:flex-start;gap:0.5rem;padding:0.55rem 0.8rem;border:2px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);cursor:pointer;transition:var(--transition);font-family:var(--font-body);font-size:0.84rem;text-align:left;line-height:1.4;}
  .opt-btn:hover:not(.disabled){border-color:var(--gmitblue);background:var(--gmitblue-pale);}
  .opt-btn .opt-key{width:24px;height:24px;border-radius:50%;background:var(--surface-alt);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:0.72rem;font-weight:700;flex-shrink:0;transition:var(--transition);}
  .opt-btn.correct{border-color:var(--correct);background:rgba(34,139,34,0.06);}.opt-btn.correct .opt-key{background:var(--correct);color:#fff;border-color:var(--correct);}
  .opt-btn.wrong{border-color:var(--wrong);background:rgba(178,34,34,0.04);}.opt-btn.wrong .opt-key{background:var(--wrong);color:#fff;border-color:var(--wrong);}
  .opt-btn.disabled{cursor:default;opacity:0.6;}.opt-btn.disabled.correct{opacity:1;}.opt-btn.disabled.wrong{opacity:0.5;}
  .feedback{border-radius:var(--radius-sm);padding:0.5rem 0.7rem;font-size:0.8rem;line-height:1.6;margin:0.5rem 0;display:none;}
  .feedback.correct{display:block;background:rgba(34,139,34,0.08);border:1px solid rgba(34,139,34,0.2);color:var(--correct);}
  .feedback.wrong{display:block;background:rgba(178,34,34,0.06);border:1px solid rgba(178,34,34,0.15);color:var(--wrong);}
  .feedback strong{font-weight:700;}
  .btn{display:inline-flex;align-items:center;gap:0.3rem;padding:0.45rem 0.85rem;border:none;border-radius:var(--radius-sm);font-family:var(--font-body);font-size:0.82rem;font-weight:600;cursor:pointer;transition:var(--transition);}
  .btn-primary{background:var(--navy);color:#fff;}.btn-accent{background:var(--forest);color:#fff;}
  .btn-row{display:flex;gap:0.4rem;flex-wrap:wrap;margin-top:0.5rem;}
  .final-box{text-align:center;padding:1.5rem 1rem;}
  .final-score{font-family:var(--font-display);font-size:2rem;font-weight:700;color:var(--navy);margin:0.5rem 0;}
  .final-msg{font-size:1rem;color:var(--text-secondary);margin-bottom:1rem;}
  .lab-footer{max-width:800px;margin:0 auto;padding:0.5rem 1rem;text-align:center;font-size:0.68rem;color:var(--text-muted);}
</style>
</head>
<body>
<header class="lab-header"><div class="lab-header-inner"><div class="lab-icon">📐</div><div><h1><span class="lab-badge">Cap 4</span>Quiz: Geometría Vectorial Completa</h1><div class="lab-subtitle">Quiz Interactivo · Geometría Vectorial</div></div></div></header>
<div class="main">
  <div class="panel" id="quizPanel">
    <div class="score-bar">
      <span class="score-item"><span style="color:var(--text-muted);">Pregunta</span> <span class="slab" id="qNum">1</span>/<span id="qTotal">12</span></span>
      <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
      <span class="score-item correct">✓ <span class="slab" id="scoreOk">0</span></span>
      <span class="score-item wrong">✗ <span class="slab" id="scoreWrong">0</span></span>
    </div>
    <div class="panel-body" id="qBody"></div>
  </div>
</div>
<footer class="lab-footer">Álgebra Lineal con Abordaje Tecnológico · Quiz 4.10 · Geometría Vectorial</footer>

<script>
const TOTAL=12;
let current=0,scoreOk=0,scoreWrong=0,answered=false,questions=[];

function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(a){return a[ri(0,a.length-1)];}
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=ri(0,i);[r[i],r[j]]=[r[j],r[i]];}return r;}
function r2(x){return Math.round(x*100)/100;}
function dot(u,v){let s=0;for(let i=0;i<u.length;i++)s+=u[i]*v[i];return s;}
function norm(u){return Math.sqrt(dot(u,u));}
function cross(u,v){return[u[1]*v[2]-u[2]*v[1],u[2]*v[0]-u[0]*v[2],u[0]*v[1]-u[1]*v[0]];}
function vStr(v){return`(${v.map(r2).join(', ')})`;}

const TOPICS={dot:{label:'Producto Punto',color:'#2980B9'},norm:{label:'Norma',color:'#E67E22'},angle:{label:'Ángulo',color:'#8E44AD'},orth:{label:'Ortogonalidad',color:'#16A085'},proj:{label:'Proyección',color:'#C0392B'},cross:{label:'Producto Cruz',color:'#2C3E50'},area:{label:'Área/Volumen',color:'#D35400'},dep:{label:'Dependencia Lineal',color:'#7D3C98'}};

// ---- QUESTION GENERATORS ----
function qDotProduct(){
  const u=[ri(-4,4),ri(-4,4),ri(-4,4)],v=[ri(-4,4),ri(-4,4),ri(-4,4)];
  const d=dot(u,v);
  const wrongs=new Set();while(wrongs.size<3){const w=d+pick([-5,-3,-2,-1,1,2,3,5]);if(w!==d)wrongs.add(w);}
  const opts=shuffle([d,...wrongs]);
  return{topic:'dot',text:`Calcule u · v donde u = ${vStr(u)} y v = ${vStr(v)}`,options:opts.map(String),correct:opts.indexOf(d),
    explanation:`u · v = ${u.map((x,i)=>`(${x})(${v[i]})`).join(' + ')} = ${d}`};
}

function qNorm(){
  const u=[ri(-4,4),ri(-4,4),ri(-4,4)];
  const n2=dot(u,u);const n=Math.sqrt(n2);
  const correct=`√${n2}`;
  const wrongs=[];
  [n2+ri(1,3),n2-ri(1,2),n2*2].forEach(w=>{if(w>0&&w!==n2)wrongs.push(`√${w}`);});
  wrongs.push(String(n2));
  const opts=shuffle([correct,...wrongs.slice(0,3)]);
  return{topic:'norm',text:`¿Cuál es ‖u‖ si u = ${vStr(u)}?`,options:opts,correct:opts.indexOf(correct),
    explanation:`‖u‖ = √(${u.map(x=>x+'²').join(' + ')}) = √(${u.map(x=>x*x).join(' + ')}) = √${n2}${Number.isInteger(n)?' = '+n:''}`};
}

function qAngle90(){
  const a=ri(-3,3),b=ri(-3,3);
  const u=[a,b];const v=[-b,a]; // perpendicular
  const d=dot(u,v);
  return{topic:'angle',text:`¿Cuál es el ángulo entre u = ${vStr(u)} y v = ${vStr(v)}?`,
    options:shuffle(['90°','0°','45°','180°']),correct:null,_correctVal:'90°',
    explanation:`u · v = ${d} = 0, por lo tanto los vectores son perpendiculares. Ángulo = 90°.`,
    get correct(){return this.options.indexOf(this._correctVal)}};
}

function qAngle0or180(){
  const u=[ri(1,3),ri(-3,3)];const k=pick([-2,-1,2,3]);const v=u.map(x=>x*k);
  const angle=k>0?'0°':'180°';
  return{topic:'angle',text:`¿Cuál es el ángulo entre u = ${vStr(u)} y v = ${vStr(v)}?`,
    options:shuffle(['0°','90°','180°','60°']),correct:null,_correctVal:angle,
    explanation:`v = ${k}u, son ${k>0?'paralelos (misma dirección)':'antiparalelos (dirección opuesta)'}. Ángulo = ${angle}.`,
    get correct(){return this.options.indexOf(this._correctVal)}};
}

function qOrthogonal(){
  const u=[ri(-3,3),ri(-3,3),ri(-3,3)],v=[ri(-3,3),ri(-3,3),ri(-3,3)];
  const d=dot(u,v);
  const isOrth=d===0;
  return{topic:'orth',text:`¿Son ortogonales u = ${vStr(u)} y v = ${vStr(v)}?`,
    options:['Sí, son ortogonales','No, no son ortogonales'],correct:isOrth?0:1,
    explanation:`u · v = ${d}. ${isOrth?'Como u · v = 0, los vectores son ortogonales.':'Como u · v ≠ 0, no son ortogonales.'}`};
}

function qOrthDesigned(){
  const a=ri(1,4),b=ri(1,4);
  const u=[a,b,0],v=[-b,a,0];
  return{topic:'orth',text:`¿Son ortogonales u = ${vStr(u)} y v = ${vStr(v)}?`,
    options:['Sí, son ortogonales','No, no son ortogonales'],correct:0,
    explanation:`u · v = (${a})(${-b}) + (${b})(${a}) + (0)(0) = ${-a*b} + ${a*b} = 0. Son ortogonales.`};
}

function qProjection(){
  const u=[ri(1,4),ri(-3,3)],v=[ri(1,4),0];
  const d=dot(u,v),nv2=dot(v,v);
  const t=d/nv2;const proj=v.map(x=>r2(x*t));
  const correct=`(${proj.join(', ')})`;
  const wrongs=[`(${u.join(', ')})`,`(${v.join(', ')})`,`(${v.map(x=>r2(x*d)).join(', ')})`];
  const opts=shuffle([correct,...wrongs.filter(w=>w!==correct).slice(0,3)]);
  return{topic:'proj',text:`Calcule Proy<sub>v</sub>u donde u = ${vStr(u)} y v = ${vStr(v)}`,options:opts,correct:opts.indexOf(correct),
    explanation:`t = (u·v)/(‖v‖²) = ${d}/${nv2} = ${r2(t)}. Proy = t·v = ${correct}`};
}

function qCrossProduct(){
  const u=[ri(-3,3),ri(-3,3),ri(-3,3)],v=[ri(-3,3),ri(-3,3),ri(-3,3)];
  const c=cross(u,v);
  const correct=vStr(c);
  const wrongs=[vStr(cross(v,u)),vStr([c[0]+ri(1,3),c[1],c[2]]),vStr([c[0],c[1]+ri(-3,-1),c[2]])];
  const opts=shuffle([correct,...wrongs.filter(w=>w!==correct).slice(0,3)]);
  return{topic:'cross',text:`Calcule u × v donde u = ${vStr(u)} y v = ${vStr(v)}`,options:opts,correct:opts.indexOf(correct),
    explanation:`u × v = (${u[1]}·${v[2]}-${u[2]}·${v[1]}, ${u[2]}·${v[0]}-${u[0]}·${v[2]}, ${u[0]}·${v[1]}-${u[1]}·${v[0]}) = ${correct}`};
}

function qCrossPerp(){
  return{topic:'cross',text:'Si w = u × v, ¿cuáles de las siguientes son siempre verdaderas?',
    options:shuffle(['w · u = 0 y w · v = 0','w · u = 1 y w · v = 1','‖w‖ = ‖u‖ · ‖v‖','u × v = v × u']),correct:null,_correctVal:'w · u = 0 y w · v = 0',
    explanation:'El producto cruz u × v es perpendicular a u y a v, por lo tanto (u × v) · u = 0 y (u × v) · v = 0.',
    get correct(){return this.options.indexOf(this._correctVal)}};
}

function qCrossAnticomm(){
  const u=[ri(1,3),ri(-2,2),ri(0,3)],v=[ri(-2,2),ri(1,3),ri(-3,0)];
  const uv=cross(u,v),vu=cross(v,u);
  return{topic:'cross',text:`Si u × v = ${vStr(uv)}, ¿cuánto es v × u?`,
    options:shuffle([vStr(vu),vStr(uv),vStr(uv.map(x=>x*2)),'(0, 0, 0)']),correct:null,_correctVal:vStr(vu),
    explanation:`v × u = -(u × v) = ${vStr(vu)} (antisimetría del producto cruz).`,
    get correct(){return this.options.indexOf(this._correctVal)}};
}

function qAreaParallelogram(){
  const u=[ri(1,4),ri(-3,3),0],v=[ri(-3,3),ri(1,4),0];
  const c=cross(u,v);const area=r2(norm(c));
  const correct=String(area);
  const wrongs=[String(r2(area*2)),String(r2(Math.abs(dot(u,v)))),String(r2(area+ri(1,3)))];
  const opts=shuffle([correct,...wrongs.filter(w=>w!==correct).slice(0,3)]);
  return{topic:'area',text:`¿Cuál es el área del paralelogramo formado por u = ${vStr(u)} y v = ${vStr(v)}?`,options:opts,correct:opts.indexOf(correct),
    explanation:`Área = ‖u × v‖ = ‖${vStr(c)}‖ = ${area}`};
}

function qLinDep2(){
  const u=[ri(1,4),ri(-3,3)];const k=pick([-3,-2,2,3]);const v=u.map(x=>x*k);
  return{topic:'dep',text:`¿Son linealmente dependientes u = ${vStr(u)} y v = ${vStr(v)}?`,
    options:['Sí, son LD (dependientes)','No, son LI (independientes)'],correct:0,
    explanation:`v = ${k}u, por lo tanto son linealmente dependientes (uno es múltiplo del otro).`};
}

function qLinIndep2(){
  let u,v;do{u=[ri(-3,3),ri(-3,3)];v=[ri(-3,3),ri(-3,3)];}while(u[0]*v[1]-u[1]*v[0]===0);
  const d=u[0]*v[1]-u[1]*v[0];
  return{topic:'dep',text:`¿Son linealmente independientes u = ${vStr(u)} y v = ${vStr(v)}?`,
    options:['Sí, son LI (independientes)','No, son LD (dependientes)'],correct:0,
    explanation:`det[u|v] = (${u[0]})(${v[1]}) - (${u[1]})(${v[0]}) = ${d} ≠ 0, por lo tanto son LI.`};
}

function qNormUnit(){
  const u=[3,4];const n=5;
  return{topic:'norm',text:`Si u = (3, 4), ¿cuál es el vector unitario en la dirección de u?`,
    options:shuffle(['(3/5, 4/5)','(3, 4)','(1, 1)','(4/5, 3/5)']),correct:null,_correctVal:'(3/5, 4/5)',
    explanation:`û = u/‖u‖ = (3,4)/5 = (3/5, 4/5). Se verifica: ‖û‖ = √(9/25 + 16/25) = 1.`,
    get correct(){return this.options.indexOf(this._correctVal)}};
}

function qDotZero(){
  return{topic:'dot',text:'Si u · v = 0 y ambos vectores son no nulos, ¿qué se puede concluir?',
    options:shuffle(['u y v son ortogonales (⊥)','u = v','u y v son paralelos','u = 0 o v = 0']),correct:null,_correctVal:'u y v son ortogonales (⊥)',
    explanation:'Por definición, dos vectores no nulos son ortogonales si y solo si su producto punto es cero.',
    get correct(){return this.options.indexOf(this._correctVal)}};
}

function qCauchySchwarz(){
  return{topic:'dot',text:'¿Cuál de las siguientes desigualdades es siempre verdadera?',
    options:shuffle(['|u · v| ≤ ‖u‖ · ‖v‖','u · v ≤ ‖u‖ + ‖v‖','‖u + v‖ = ‖u‖ + ‖v‖','‖u × v‖ ≤ u · v']),correct:null,_correctVal:'|u · v| ≤ ‖u‖ · ‖v‖',
    explanation:'Esta es la desigualdad de Cauchy-Schwarz: |u · v| ≤ ‖u‖ · ‖v‖, demostrada en el Teorema del capítulo.',
    get correct(){return this.options.indexOf(this._correctVal)}};
}

function qTripleProduct(){
  const u=[1,0,0],v=[0,1,0],w=[0,0,1];
  return{topic:'area',text:'¿Cuál es el volumen del paralelepípedo formado por i = (1,0,0), j = (0,1,0), k = (0,0,1)?',
    options:shuffle(['1','0','3','√3']),correct:null,_correctVal:'1',
    explanation:'Vol = |(i × j) · k| = |k · k| = |1| = 1. Es el cubo unitario.',
    get correct(){return this.options.indexOf(this._correctVal)}};
}

function qProjFormula(){
  return{topic:'proj',text:'La fórmula de la proyección ortogonal de u sobre v es:',
    options:shuffle(['Proy = (u·v / ‖v‖²) · v','Proy = (u·v) · v','Proy = u · (v / ‖v‖)','Proy = (‖u‖ / ‖v‖) · v']),correct:null,_correctVal:'Proy = (u·v / ‖v‖²) · v',
    explanation:'Proy_v(u) = (u·v / ‖v‖²) · v = ((u·v)/(v·v)) · v. El escalar t = u·v/‖v‖² multiplica al vector v.',
    get correct(){return this.options.indexOf(this._correctVal)}};
}

// ---- BUILD QUIZ ----
const ALL=[qDotProduct,qNorm,qAngle90,qAngle0or180,qOrthogonal,qOrthDesigned,qProjection,qCrossProduct,qCrossPerp,qCrossAnticomm,qAreaParallelogram,qLinDep2,qLinIndep2,qNormUnit,qDotZero,qCauchySchwarz,qTripleProduct,qProjFormula];

function buildQuiz(){
  questions=shuffle(ALL).slice(0,TOTAL).map(gen=>{
    const q=gen();
    // Resolve lazy correct for shuffled options
    if(q._correctVal!==undefined&&q.correct===null){q.correct=q.options.indexOf(q._correctVal);}
    return q;
  });
  current=0;scoreOk=0;scoreWrong=0;answered=false;showQuestion();
}

function showQuestion(){
  if(current>=TOTAL){showFinal();return;}
  const q=questions[current];answered=false;
  document.getElementById('qNum').textContent=current+1;
  document.getElementById('qTotal').textContent=TOTAL;
  document.getElementById('scoreOk').textContent=scoreOk;
  document.getElementById('scoreWrong').textContent=scoreWrong;
  document.getElementById('progFill').style.width=((current/TOTAL)*100)+'%';
  const t=TOPICS[q.topic];
  let html=`<div class="q-counter">Pregunta ${current+1} de ${TOTAL}</div>`;
  html+=`<span class="q-topic" style="background:${t.color}15;color:${t.color};border:1px solid ${t.color}33;">${t.label}</span>`;
  html+=`<div class="q-text">${q.text}</div>`;
  html+=`<div class="options" id="opts">`;
  const keys='ABCD';
  q.options.forEach((opt,i)=>{html+=`<button class="opt-btn" onclick="answer(${i})"><span class="opt-key">${keys[i]}</span><span>${opt}</span></button>`;});
  html+=`</div><div class="feedback" id="fb"></div>`;
  html+=`<div class="btn-row" id="btnRow" style="display:none;"><button class="btn btn-primary" onclick="nextQ()">Siguiente →</button></div>`;
  document.getElementById('qBody').innerHTML=html;
}

function answer(idx){
  if(answered)return;answered=true;
  const q=questions[current];const isCorrect=idx===q.correct;
  if(isCorrect)scoreOk++;else scoreWrong++;
  document.querySelectorAll('.opt-btn').forEach((btn,i)=>{btn.classList.add('disabled');if(i===q.correct)btn.classList.add('correct');if(i===idx&&!isCorrect)btn.classList.add('wrong');});
  const fb=document.getElementById('fb');
  fb.className=`feedback ${isCorrect?'correct':'wrong'}`;
  fb.innerHTML=`<strong>${isCorrect?'¡Correcto!':'Incorrecto.'}</strong> ${q.explanation}`;
  document.getElementById('scoreOk').textContent=scoreOk;document.getElementById('scoreWrong').textContent=scoreWrong;
  document.getElementById('btnRow').style.display='flex';
}

function nextQ(){current++;showQuestion();}

function showFinal(){
  const pct=Math.round((scoreOk/TOTAL)*100);
  const stars=pct>=90?'⭐⭐⭐':pct>=70?'⭐⭐':pct>=50?'⭐':'';
  let msg=pct>=90?'¡Excelente! Dominas la geometría vectorial.':pct>=70?'¡Muy bien! Buen manejo del tema.':pct>=50?'Aprobado. Repasa proyecciones y producto cruz.':'Necesitas más práctica. Revisa el Capítulo 4 del libro.';
  document.getElementById('progFill').style.width='100%';
  document.getElementById('qBody').innerHTML=`<div class="final-box"><div style="font-size:0.9rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.1em;">Resultado Final</div><div class="final-score">${scoreOk} / ${TOTAL}</div><div style="margin:0.3rem 0;">${stars}</div><div class="final-msg">${msg}</div><div style="font-family:var(--font-mono);font-size:0.8rem;color:var(--text-secondary);margin-bottom:1rem;">✓ ${scoreOk} &nbsp;|&nbsp; ✗ ${scoreWrong} &nbsp;|&nbsp; ${pct}%</div><button class="btn btn-accent" onclick="buildQuiz()" style="font-size:0.9rem;padding:0.6rem 1.5rem;">🔄 Reintentar</button></div>`;
}

document.addEventListener('keydown',e=>{
  if(!answered){const idx='abcd'.indexOf(e.key.toLowerCase());if(idx>=0&&idx<(questions[current]?.options.length||0))answer(idx);
    if(e.key>='1'&&e.key<='4'){const i=parseInt(e.key)-1;if(i<(questions[current]?.options.length||0))answer(i);}}
  else{if(e.key==='Enter'||e.key===' '||e.key==='ArrowRight')nextQ();}
});

window.addEventListener('DOMContentLoaded',buildQuiz);
</script>
</body>
</html>
