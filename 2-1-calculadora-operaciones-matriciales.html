<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Operaciones Matriciales — Álgebra Lineal</title>
<style>
  :root{--brick:#B22222;--navy:#000080;--forest:#228B22;--gmitblue:#5A8AA8;--gmitblue-pale:rgba(90,138,168,0.12);--bg:#F4F1EC;--surface:#FFFFFF;--surface-alt:#F9F7F4;--text:#1E1E1E;--text-secondary:#555;--text-muted:#888;--border:#D6D0C6;--shadow:0 2px 16px rgba(0,0,0,0.07);--radius:10px;--radius-sm:6px;--transition:0.25s cubic-bezier(.4,0,.2,1);--font-display:'Playfair Display',Georgia,serif;--font-body:'Source Sans 3','Segoe UI',sans-serif;--font-mono:'JetBrains Mono','Fira Code',monospace;}
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Source+Sans+3:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--font-body);background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;}
  .lab-header{background:linear-gradient(135deg,var(--navy) 0%,var(--gmitblue) 100%);color:#fff;padding:0.7rem 1.5rem;position:relative;overflow:hidden;}
  .lab-header::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 15% 50%,rgba(255,255,255,0.08) 0%,transparent 50%);pointer-events:none;}
  .lab-header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:0.8rem;position:relative;z-index:1;}
  .lab-icon{width:38px;height:38px;background:rgba(255,255,255,0.15);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.15rem;flex-shrink:0;}
  .lab-header h1{font-family:var(--font-display);font-size:clamp(0.9rem,2vw,1.25rem);font-weight:700;line-height:1.2;}
  .lab-subtitle{font-size:0.72rem;opacity:0.75;}
  .lab-badge{display:inline-block;background:var(--brick);color:#fff;font-size:0.6rem;font-weight:700;padding:0.15em 0.5em;border-radius:3px;letter-spacing:0.05em;text-transform:uppercase;margin-right:0.35rem;vertical-align:middle;}
  .main{max-width:1200px;margin:0 auto;padding:0.6rem 0.8rem 1.5rem;}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:0.7rem;}
  .panel-head{padding:0.5rem 0.9rem;font-family:var(--font-display);font-size:0.85rem;font-weight:700;color:var(--navy);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0.4rem;background:var(--surface-alt);flex-wrap:wrap;}
  .panel-body{padding:0.7rem 0.9rem;}
  /* Op selector */
  .op-tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:0.7rem;}
  .op-tab{padding:0.5rem 1rem;border:none;background:transparent;font-family:var(--font-body);font-size:0.82rem;font-weight:600;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:var(--transition);}
  .op-tab:hover{color:var(--text);}
  .op-tab.active{color:var(--navy);border-bottom-color:var(--navy);}
  /* Matrix input */
  .matrices-row{display:flex;align-items:center;gap:0.8rem;flex-wrap:wrap;justify-content:center;margin-bottom:0.7rem;}
  .mat-block{display:flex;flex-direction:column;align-items:center;gap:0.25rem;}
  .mat-label{font-family:var(--font-mono);font-size:0.8rem;font-weight:700;}
  .mat-label.blue{color:var(--gmitblue);}
  .mat-label.orange{color:#E67E22;}
  .mat-label.green{color:var(--forest);}
  .mat-wrap{display:inline-flex;align-items:stretch;}
  .mat-bk{display:flex;flex-direction:column;justify-content:center;user-select:none;}
  .mat-bk.left{border-left:2.5px solid var(--navy);border-top:2.5px solid var(--navy);border-bottom:2.5px solid var(--navy);border-radius:4px 0 0 4px;width:7px;}
  .mat-bk.right{border-right:2.5px solid var(--navy);border-top:2.5px solid var(--navy);border-bottom:2.5px solid var(--navy);border-radius:0 4px 4px 0;width:7px;}
  .mat-grid{display:grid;gap:3px;padding:4px 3px;}
  .mat-grid input{width:50px;padding:0.3rem 0.15rem;border:1px solid var(--border);border-radius:3px;font-family:var(--font-mono);font-size:0.82rem;text-align:center;background:#fff;transition:var(--transition);}
  .mat-grid input:focus{outline:none;border-color:var(--gmitblue);box-shadow:0 0 0 2px rgba(90,138,168,0.15);}
  .mat-grid input.hl-row{background:rgba(41,128,185,0.1);border-color:rgba(41,128,185,0.3);}
  .mat-grid input.hl-col{background:rgba(230,126,34,0.1);border-color:rgba(230,126,34,0.3);}
  .mat-grid input.hl-cell{background:rgba(34,139,34,0.15);border-color:var(--forest);font-weight:700;}
  .op-symbol{font-size:1.8rem;font-weight:300;color:var(--navy);line-height:1;user-select:none;padding:0 0.3rem;}
  .eq-symbol{font-size:1.8rem;font-weight:300;color:var(--text-muted);line-height:1;user-select:none;padding:0 0.3rem;}
  /* Result matrix (readonly) */
  .mat-grid input:disabled{background:rgba(34,139,34,0.06);color:var(--forest);font-weight:700;border-color:rgba(34,139,34,0.3);opacity:1;}
  /* Size selectors */
  .size-row{display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;margin-bottom:0.5rem;font-size:0.8rem;}
  .size-row label{font-weight:600;color:var(--text-secondary);}
  .size-row select{padding:0.25rem 0.4rem;border:1px solid var(--border);border-radius:4px;font-family:var(--font-mono);font-size:0.82rem;background:#fff;}
  /* Scalar input */
  .scalar-row{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem;}
  .scalar-row label{font-size:0.8rem;font-weight:600;color:var(--text-secondary);}
  .scalar-row input{width:60px;padding:0.3rem;border:1px solid var(--border);border-radius:4px;font-family:var(--font-mono);font-size:0.88rem;text-align:center;}
  /* Steps */
  .steps-box{font-family:var(--font-mono);font-size:0.76rem;line-height:1.9;max-height:45vh;overflow-y:auto;}
  .step-entry{padding:0.35rem 0.6rem;border-radius:var(--radius-sm);margin-bottom:0.25rem;background:var(--surface-alt);border:1px solid var(--border);cursor:pointer;transition:var(--transition);}
  .step-entry:hover,.step-entry.active{border-color:var(--gmitblue);background:var(--gmitblue-pale);}
  .step-entry .se-pos{font-weight:700;color:var(--forest);margin-right:0.3rem;}
  .step-entry .se-calc{color:var(--text-secondary);}
  .step-entry .se-val{font-weight:700;color:var(--navy);}
  /* Presets */
  .preset-scroll{display:flex;gap:0.25rem;flex-wrap:wrap;margin-bottom:0.5rem;}
  .preset-pill{padding:0.2rem 0.5rem;border:1px solid var(--border);border-radius:20px;background:var(--surface);cursor:pointer;transition:var(--transition);font-size:0.66rem;font-weight:600;white-space:nowrap;}
  .preset-pill:hover{border-color:var(--navy);background:var(--gmitblue-pale);}
  .preset-pill.active{background:var(--navy);color:#fff;border-color:var(--navy);}
  .btn{display:inline-flex;align-items:center;gap:0.3rem;padding:0.4rem 0.7rem;border:none;border-radius:var(--radius-sm);font-family:var(--font-body);font-size:0.76rem;font-weight:600;cursor:pointer;transition:var(--transition);white-space:nowrap;}
  .btn-primary{background:var(--forest);color:#fff;}.btn-primary:hover{background:#2eb82e;}
  .btn-accent{background:var(--brick);color:#fff;}
  .btn-row{display:flex;gap:0.4rem;flex-wrap:wrap;}
  .context-box{background:linear-gradient(135deg,var(--gmitblue-pale),rgba(90,138,168,0.04));border-left:3px solid var(--gmitblue);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:0.5rem 0.7rem;font-size:0.74rem;line-height:1.5;color:var(--text-secondary);margin-bottom:0.5rem;}
  .context-box strong{color:var(--navy);}
  .err-msg{background:rgba(178,34,34,0.08);border:1px solid rgba(178,34,34,0.2);border-radius:var(--radius-sm);padding:0.4rem 0.6rem;color:var(--brick);font-size:0.78rem;font-weight:600;margin-top:0.3rem;display:none;}
  .lab-footer{max-width:1200px;margin:0 auto;padding:0.5rem 1rem;text-align:center;font-size:0.68rem;color:var(--text-muted);}
  @media(max-width:700px){.main{padding:0.4rem;}.mat-grid input{width:40px;font-size:0.75rem;}.matrices-row{gap:0.4rem;}}
</style>
</head>
<body>
<header class="lab-header"><div class="lab-header-inner"><div class="lab-icon">🧮</div><div><h1><span class="lab-badge">Cap 2</span>Calculadora de Operaciones Matriciales</h1><div class="lab-subtitle">Laboratorio Interactivo · Matrices</div></div></div></header>
<div class="main">
  <!-- Operation selector -->
  <div class="panel">
    <div class="panel-body" style="padding:0.4rem 0.9rem;">
      <div class="op-tabs">
        <button class="op-tab active" onclick="setOp('sum')">A + B</button>
        <button class="op-tab" onclick="setOp('sub')">A − B</button>
        <button class="op-tab" onclick="setOp('scalar')">kA</button>
        <button class="op-tab" onclick="setOp('mul')">A · B</button>
        <button class="op-tab" onclick="setOp('trans')">Aᵀ</button>
      </div>
      <div class="preset-scroll" id="presets"></div>
      <div class="size-row">
        <label>A:</label>
        <select id="rowsA" onchange="rebuild()"><option>2</option><option selected>3</option><option>4</option></select>×
        <select id="colsA" onchange="rebuild()"><option>2</option><option selected>3</option><option>4</option></select>
        <span id="sizeBWrap"><label style="margin-left:0.6rem;">B:</label>
        <select id="rowsB" onchange="rebuild()"><option>2</option><option selected>3</option><option>4</option></select>×
        <select id="colsB" onchange="rebuild()"><option>2</option><option selected>3</option><option>4</option></select></span>
        <span id="scalarWrap" style="display:none;margin-left:0.6rem;"><label>k =</label><input type="number" id="scalarK" value="9" step="any" style="width:55px;padding:0.25rem;border:1px solid var(--border);border-radius:4px;font-family:var(--font-mono);font-size:0.85rem;text-align:center;" oninput="compute()"></span>
      </div>
    </div>
  </div>
  <!-- Matrices -->
  <div class="panel">
    <div class="panel-head">📝 Matrices<span style="margin-left:auto;font-size:0.7rem;color:var(--text-muted);font-family:var(--font-mono);" id="dimInfo"></span></div>
    <div class="panel-body">
      <div class="matrices-row" id="matricesRow"></div>
      <div class="err-msg" id="errMsg"></div>
      <div class="btn-row" style="margin-top:0.5rem;justify-content:center;">
        <button class="btn btn-primary" onclick="compute()">▶ Calcular</button>
        <button class="btn btn-accent" onclick="clearAll()">Limpiar</button>
      </div>
    </div>
  </div>
  <!-- Steps -->
  <div class="panel" id="stepsPanel" style="display:none;">
    <div class="panel-head">📊 Cálculo Paso a Paso<span style="margin-left:auto;font-size:0.7rem;color:var(--text-muted);font-family:var(--font-mono);" id="stepCount"></span></div>
    <div class="panel-body">
      <div class="context-box" id="stepsCtx"></div>
      <div class="steps-box" id="stepsBox"></div>
    </div>
  </div>
</div>
<footer class="lab-footer">Álgebra Lineal con Abordaje Tecnológico · Laboratorio 2.1 · Operaciones Matriciales</footer>

<script>
let op='sum';
let highlightRC=null; // {r,c} for product highlighting

const PRESETS=[
  {name:'Libro: A+B (2×3)',op:'sum',rA:2,cA:3,rB:2,cB:3,A:[[2,-1,0],[5,4,7]],B:[[5,8,4],[0,-3,9]]},
  {name:'Libro: 9A (2×3)',op:'scalar',rA:2,cA:3,k:9,A:[[2,5,4],[-1,0,8]]},
  {name:'Libro: A-B (2×2)',op:'sub',rA:2,cA:2,rB:2,cB:2,A:[[4,5],[8,0]],B:[[-1,2],[4,5]]},
  {name:'Libro: CD (3×3)',op:'mul',rA:3,cA:3,rB:3,cB:3,A:[[8,-2,3],[4,10,0],[-3,5,-1]],B:[[1,-5,2],[0,-1,3],[13,7,2]]},
  {name:'Identidad 3×3',op:'mul',rA:3,cA:3,rB:3,cB:3,A:[[1,0,0],[0,1,0],[0,0,1]],B:[[2,3,4],[5,6,7],[8,9,10]]},
  {name:'Transpuesta 2×3',op:'trans',rA:2,cA:3,A:[[1,2,3],[4,5,6]]},
  {name:'AB vs BA',op:'mul',rA:2,cA:2,rB:2,cB:2,A:[[1,2],[3,4]],B:[[0,1],[1,0]]},
];

window.addEventListener('DOMContentLoaded',()=>{buildPresets();rebuild();});

function buildPresets(){const g=document.getElementById('presets');PRESETS.forEach((p,i)=>{const b=document.createElement('button');b.className='preset-pill';b.textContent=p.name;b.onclick=()=>loadPreset(i);g.appendChild(b);});}

function loadPreset(i){
  const p=PRESETS[i];
  setOp(p.op);
  document.getElementById('rowsA').value=p.rA;document.getElementById('colsA').value=p.cA;
  if(p.rB){document.getElementById('rowsB').value=p.rB;document.getElementById('colsB').value=p.cB;}
  if(p.k)document.getElementById('scalarK').value=p.k;
  rebuild();
  // Fill A
  for(let i=0;i<p.A.length;i++)for(let j=0;j<p.A[0].length;j++){const el=document.getElementById(`a_${i}_${j}`);if(el)el.value=p.A[i][j];}
  // Fill B
  if(p.B)for(let i=0;i<p.B.length;i++)for(let j=0;j<p.B[0].length;j++){const el=document.getElementById(`b_${i}_${j}`);if(el)el.value=p.B[i][j];}
  document.querySelectorAll('.preset-pill').forEach((b,j)=>b.classList.toggle('active',j===i));
  compute();
}

function setOp(o){
  op=o;
  document.querySelectorAll('.op-tab').forEach(t=>t.classList.toggle('active',t.textContent.includes(
    o==='sum'?'+':o==='sub'?'−':o==='scalar'?'kA':o==='mul'?'·':'ᵀ')));
  const showB=o==='sum'||o==='sub'||o==='mul';
  document.getElementById('sizeBWrap').style.display=showB?'':'none';
  document.getElementById('scalarWrap').style.display=o==='scalar'?'':'none';
  // For mul, colsA must equal rowsB
  if(o==='mul'){document.getElementById('rowsB').value=document.getElementById('colsA').value;}
  rebuild();
}

function gSize(id){return parseInt(document.getElementById(id).value);}
function r2(x){return Math.round(x*1000)/1000;}

function rebuild(){
  const rA=gSize('rowsA'),cA=gSize('colsA');
  let rB=gSize('rowsB'),cB=gSize('colsB');
  if(op==='mul'){rB=cA;document.getElementById('rowsB').value=rB;}
  const row=document.getElementById('matricesRow');
  let html='';
  // Matrix A
  html+=buildMatrixHTML('A','a',rA,cA,'blue');
  if(op==='sum')html+=`<span class="op-symbol">+</span>`;
  else if(op==='sub')html+=`<span class="op-symbol">−</span>`;
  else if(op==='scalar'){
    html=`<span class="op-symbol" style="font-size:1.2rem;">${document.getElementById('scalarK').value} ·</span>`+html;
  }
  else if(op==='mul')html+=`<span class="op-symbol">·</span>`;
  else if(op==='trans')html+=`<span class="op-symbol" style="font-size:1rem;">→ Aᵀ</span>`;
  // Matrix B (if needed)
  if(op==='sum'||op==='sub')html+=buildMatrixHTML('B','b',rA,cA,'orange');
  else if(op==='mul')html+=buildMatrixHTML('B','b',rB,cB,'orange');
  // Equals + Result
  const rR=op==='trans'?cA:(op==='mul'?rA:rA);
  const cR=op==='trans'?rA:(op==='mul'?cB:cA);
  html+=`<span class="eq-symbol">=</span>`;
  html+=buildMatrixHTML('R','r',rR,cR,'green',true);
  row.innerHTML=html;
  document.getElementById('dimInfo').textContent=op==='mul'?`(${rA}×${cA}) · (${rB}×${cB}) = (${rA}×${cB})`:op==='trans'?`(${rA}×${cA})ᵀ = (${cA}×${rA})`:`(${rA}×${cA})`;
  document.getElementById('stepsPanel').style.display='none';
  document.getElementById('errMsg').style.display='none';
}

function buildMatrixHTML(label,prefix,rows,cols,colorClass,disabled){
  let html=`<div class="mat-block"><span class="mat-label ${colorClass}">${label}</span><div class="mat-wrap"><div class="mat-bk left"></div>`;
  html+=`<div class="mat-grid" style="grid-template-columns:repeat(${cols},1fr);">`;
  for(let i=0;i<rows;i++)for(let j=0;j<cols;j++){
    html+=`<input type="number" id="${prefix}_${i}_${j}" value="0" step="any" ${disabled?'disabled':''} onfocus="this.select()">`;
  }
  html+=`</div><div class="mat-bk right"></div></div></div>`;
  return html;
}

function readMatrix(prefix,rows,cols){
  const M=[];
  for(let i=0;i<rows;i++){const row=[];for(let j=0;j<cols;j++){row.push(parseFloat(document.getElementById(`${prefix}_${i}_${j}`)?.value)||0);}M.push(row);}
  return M;
}

function writeResult(M){
  for(let i=0;i<M.length;i++)for(let j=0;j<M[0].length;j++){const el=document.getElementById(`r_${i}_${j}`);if(el)el.value=r2(M[i][j]);}
}

function clearAll(){
  document.querySelectorAll('.mat-grid input').forEach(inp=>{if(!inp.disabled)inp.value=0;else inp.value='';});
  document.getElementById('stepsPanel').style.display='none';
  document.getElementById('errMsg').style.display='none';
}

// ---- COMPUTE ----
function compute(){
  const rA=gSize('rowsA'),cA=gSize('colsA');
  const A=readMatrix('a',rA,cA);
  const err=document.getElementById('errMsg');
  err.style.display='none';
  highlightRC=null;
  clearHighlights();

  if(op==='sum'||op==='sub'){
    const B=readMatrix('b',rA,cA);
    const R=A.map((row,i)=>row.map((v,j)=>op==='sum'?v+B[i][j]:v-B[i][j]));
    writeResult(R);
    showStepsAddSub(A,B,R);
  } else if(op==='scalar'){
    const k=parseFloat(document.getElementById('scalarK').value)||0;
    const R=A.map(row=>row.map(v=>k*v));
    writeResult(R);
    showStepsScalar(A,k,R);
  } else if(op==='mul'){
    const rB=gSize('rowsB'),cB=gSize('colsB');
    if(cA!==rB){err.textContent=`Error: columnas de A (${cA}) ≠ filas de B (${rB}). El producto no está definido.`;err.style.display='block';return;}
    const B=readMatrix('b',rB,cB);
    const R=[];
    for(let i=0;i<rA;i++){const row=[];for(let j=0;j<cB;j++){let s=0;for(let k=0;k<cA;k++)s+=A[i][k]*B[k][j];row.push(s);}R.push(row);}
    writeResult(R);
    showStepsMul(A,B,R,rA,cA,cB);
  } else if(op==='trans'){
    const R=[];for(let j=0;j<cA;j++){const row=[];for(let i=0;i<rA;i++)row.push(A[i][j]);R.push(row);}
    writeResult(R);
    showStepsTrans(A,R,rA,cA);
  }
  document.getElementById('stepsPanel').style.display='';
}

// ---- STEPS ----
function showStepsAddSub(A,B,R){
  const sign=op==='sum'?'+':'−';
  document.getElementById('stepsCtx').innerHTML=`La ${op==='sum'?'suma':'resta'} se realiza <strong>entrada por entrada</strong>: (A${sign}B)<sub>ij</sub> = a<sub>ij</sub> ${sign} b<sub>ij</sub>`;
  let html='';
  for(let i=0;i<A.length;i++)for(let j=0;j<A[0].length;j++){
    html+=`<div class="step-entry" onmouseenter="hlCell('a',${i},${j});hlCell('b',${i},${j});hlCell('r',${i},${j})" onmouseleave="clearHighlights()">
      <span class="se-pos">(${i+1},${j+1})</span>
      <span class="se-calc">${r2(A[i][j])} ${sign} ${r2(B[i][j])}</span> = <span class="se-val">${r2(R[i][j])}</span></div>`;
  }
  document.getElementById('stepsBox').innerHTML=html;
  document.getElementById('stepCount').textContent=`${A.length*A[0].length} entradas`;
}

function showStepsScalar(A,k,R){
  document.getElementById('stepsCtx').innerHTML=`Multiplicación escalar: cada entrada se multiplica por <strong>k = ${r2(k)}</strong>`;
  let html='';
  for(let i=0;i<A.length;i++)for(let j=0;j<A[0].length;j++){
    html+=`<div class="step-entry" onmouseenter="hlCell('a',${i},${j});hlCell('r',${i},${j})" onmouseleave="clearHighlights()">
      <span class="se-pos">(${i+1},${j+1})</span>
      <span class="se-calc">${r2(k)} × ${r2(A[i][j])}</span> = <span class="se-val">${r2(R[i][j])}</span></div>`;
  }
  document.getElementById('stepsBox').innerHTML=html;
  document.getElementById('stepCount').textContent=`${A.length*A[0].length} entradas`;
}

function showStepsMul(A,B,R,m,n,p){
  document.getElementById('stepsCtx').innerHTML=`Producto matricial: (AB)<sub>ij</sub> = <strong>fila i de A · columna j de B</strong> = Σ a<sub>ik</sub>b<sub>kj</sub>`;
  let html='';
  for(let i=0;i<m;i++)for(let j=0;j<p;j++){
    const terms=[];
    for(let k=0;k<n;k++) terms.push(`(${r2(A[i][k])})(${r2(B[k][j])})`);
    const products=[];
    for(let k=0;k<n;k++) products.push(r2(A[i][k]*B[k][j]));
    html+=`<div class="step-entry" onmouseenter="hlRowCol(${i},${j},${n},${p})" onmouseleave="clearHighlights()">
      <span class="se-pos">(${i+1},${j+1})</span>
      <span class="se-calc">${terms.join(' + ')}</span><br>
      <span class="se-calc" style="padding-left:2.5rem;">= ${products.join(' + ')}</span>
       = <span class="se-val">${r2(R[i][j])}</span></div>`;
  }
  document.getElementById('stepsBox').innerHTML=html;
  document.getElementById('stepCount').textContent=`${m*p} entradas (${m*p*n} multiplicaciones)`;
}

function showStepsTrans(A,R,m,n){
  document.getElementById('stepsCtx').innerHTML=`Transpuesta: (Aᵀ)<sub>ij</sub> = A<sub>ji</sub> — se intercambian filas y columnas.`;
  let html='';
  for(let i=0;i<n;i++)for(let j=0;j<m;j++){
    html+=`<div class="step-entry" onmouseenter="hlCell('a',${j},${i});hlCell('r',${i},${j})" onmouseleave="clearHighlights()">
      <span class="se-pos">(Aᵀ)<sub>${i+1},${j+1}</sub></span>
      <span class="se-calc">= A<sub>${j+1},${i+1}</sub></span> = <span class="se-val">${r2(R[i][j])}</span></div>`;
  }
  document.getElementById('stepsBox').innerHTML=html;
  document.getElementById('stepCount').textContent=`${m*n} entradas`;
}

// ---- HIGHLIGHTING ----
function hlCell(prefix,i,j){
  const el=document.getElementById(`${prefix}_${i}_${j}`);
  if(el)el.classList.add('hl-cell');
}

function hlRowCol(row,col,n,p){
  clearHighlights();
  // Highlight row of A
  for(let k=0;k<n;k++){const el=document.getElementById(`a_${row}_${k}`);if(el)el.classList.add('hl-row');}
  // Highlight col of B
  const rB=n;
  for(let k=0;k<rB;k++){const el=document.getElementById(`b_${k}_${col}`);if(el)el.classList.add('hl-col');}
  // Highlight result cell
  hlCell('r',row,col);
}

function clearHighlights(){
  document.querySelectorAll('.hl-row,.hl-col,.hl-cell').forEach(el=>{el.classList.remove('hl-row','hl-col','hl-cell');});
}
</script>
